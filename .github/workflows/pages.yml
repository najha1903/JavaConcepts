name: Deploy Notes to GitHub Pages

# Publishes the revision dashboard (notes-first, mobile-friendly) to GitHub Pages.
# Live site: https://najha1903.github.io/JavaConcepts/
# To redeploy manually: Actions tab -> "Deploy Notes to GitHub Pages" -> Run workflow.

on:
  push:
    branches: [main]
    paths:
      - 'revision-dashboard/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: revision-dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
